global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: linux-vms
    static_configs:
      - targets:
          - 100.104.130.56:9100
          - 100.67.172.46:9100
          - 100.72.147.40:9100

  - job_name: monitoring-host
    static_configs:
      - targets:
          - 100.126.95.102:9100

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"
