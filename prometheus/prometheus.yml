          - 100.96.195.31:9100
          - 100.67.133.20:9100
          - 100.65.44.64:9100
          - 100.78.225.118:9100
          - 100.82.145.11:9100
          - 100.85.247.100:9100
          - 100.67.172.46:9100

  - job_name: monitoring-host
    static_configs:
      - targets:
          - 100.126.95.102:9100

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"
